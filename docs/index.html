<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='g'><stop offset='0%25' stop-color='%23fff'/><stop offset='60%25' stop-color='%23a0f'/><stop offset='100%25' stop-color='%23408'/></radialGradient></defs><circle cx='16' cy='16' r='14' fill='url(%23g)'/></svg>">
  <title>Orb.io — cosmic multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #03051a;
      overflow: hidden;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: default;
      color: #fff;
    }
    #game {
      display: block; position: fixed; top: 0; left: 0;
    }

    /* Flat outline buttons */
    .btn {
      padding: 14px 32px; font-size: 16px; font-weight: 600;
      border: 1.5px solid rgba(180, 140, 255, 0.45);
      border-radius: 28px; background: transparent;
      color: rgba(255, 255, 255, 0.92); cursor: pointer;
      letter-spacing: 2px; text-transform: uppercase;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: scale(1.04); border-color: #b48cff; box-shadow: 0 0 24px rgba(180, 140, 255, 0.25); }
    .btn:active { transform: scale(0.97); }
    .btn.accent-pink { border-color: rgba(255, 100, 180, 0.45); color: rgba(255, 200, 230, 0.95); }
    .btn.accent-pink:hover { border-color: #ff64b4; box-shadow: 0 0 24px rgba(255, 100, 180, 0.25); }
    .btn.accent-cyan { border-color: rgba(100, 220, 255, 0.45); color: rgba(200, 240, 255, 0.95); }
    .btn.accent-cyan:hover { border-color: #64dcff; box-shadow: 0 0 24px rgba(100, 220, 255, 0.25); }

    /* Start screen */
    #startScreen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: transparent;
    }
    #startScreen h1 {
      font-size: 90px; font-weight: 800; letter-spacing: 8px;
      background: linear-gradient(135deg, #b48cff 0%, #ff64b4 50%, #64dcff 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 4px;
      filter: drop-shadow(0 0 40px rgba(180, 140, 255, 0.4));
      animation: titleFloat 4s ease-in-out infinite;
    }
    @keyframes titleFloat {
      0%, 100% { filter: drop-shadow(0 0 40px rgba(180, 140, 255, 0.4)); }
      50% { filter: drop-shadow(0 0 80px rgba(255, 100, 180, 0.6)); }
    }
    #startScreen .tagline {
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px; letter-spacing: 4px; margin-bottom: 40px;
      text-transform: uppercase;
    }
    #startScreen input {
      width: 340px; padding: 14px 20px; font-size: 18px;
      border: 1.5px solid rgba(180, 140, 255, 0.25); border-radius: 28px;
      background: rgba(10, 6, 32, 0.6); color: #fff; text-align: center; outline: none;
      margin-bottom: 18px; transition: border-color 0.3s, box-shadow 0.3s;
    }
    #startScreen input:focus { border-color: #b48cff; box-shadow: 0 0 20px rgba(180, 140, 255, 0.25); }
    #startScreen .btn { width: 340px; margin-bottom: 10px; }
    #onlineCount { font-size: 12px; color: rgba(100, 220, 255, 0.7); margin-top: 2px; }
    #startScreen .subtitle {
      color: rgba(255, 255, 255, 0.3);
      margin-top: 28px; font-size: 12px; letter-spacing: 1.5px;
    }

    /* Room screen */
    #roomScreen, #skinScreen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: transparent;
    }
    #roomScreen h2, #skinScreen h2 {
      font-size: 36px; color: #fff; margin-bottom: 24px; letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(180, 140, 255, 0.6);
    }
    .room-list { display: flex; flex-direction: column; gap: 10px; width: 420px; margin-bottom: 16px; max-height: 55vh; overflow-y: auto; padding: 0 10px; }
    .room-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; border: 1.5px solid rgba(180, 140, 255, 0.18);
      border-radius: 16px; background: rgba(10, 6, 32, 0.5);
      cursor: pointer; transition: transform 0.15s, border-color 0.2s;
    }
    .room-card:hover { transform: scale(1.02); border-color: rgba(180, 140, 255, 0.5); }
    .room-card.full { opacity: 0.4; cursor: not-allowed; }
    .room-card .room-name { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    .room-card .room-players { color: #64dcff; font-size: 14px; font-weight: bold; }

    /* Skin picker */
    .skin-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
      width: 520px; max-height: 60vh; overflow-y: auto; padding: 4px; margin-bottom: 20px;
    }
    .skin-card {
      width: 90px; height: 90px;
      border: 1.5px solid rgba(180, 140, 255, 0.15); border-radius: 16px;
      background: rgba(10, 6, 32, 0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, border-color 0.2s;
    }
    .skin-card:hover { transform: scale(1.08); border-color: rgba(180, 140, 255, 0.5); }
    .skin-card.selected { border-color: #ff64b4; box-shadow: 0 0 20px rgba(255, 100, 180, 0.3); }

    /* Death screen */
    #deathScreen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: rgba(3, 5, 26, 0.9); backdrop-filter: blur(10px);
    }
    #deathScreen h2 {
      font-size: 48px; font-weight: 800;
      background: linear-gradient(135deg, #ff64b4, #ff4488);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 30px rgba(255, 100, 180, 0.5));
    }
    #deathScreen .score { font-size: 24px; color: #fff; margin-bottom: 28px; opacity: 0.85; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 50; display: none;
    }
    #leaderboard {
      position: absolute; top: 10px; right: 10px;
      background: rgba(10, 6, 32, 0.7); border: 1px solid rgba(180, 140, 255, 0.2);
      border-radius: 10px; padding: 12px 16px; min-width: 220px;
      backdrop-filter: blur(10px);
    }
    #leaderboard h3 {
      color: #b48cff; font-size: 13px; text-transform: uppercase;
      letter-spacing: 2px; margin-bottom: 8px; text-align: center;
    }
    .lb-entry {
      color: rgba(255, 255, 255, 0.75); font-size: 13px;
      padding: 2px 0; display: flex; justify-content: space-between;
    }
    .lb-entry.me { color: #64dcff; font-weight: bold; }
    .ai-badge {
      font-size: 9px; padding: 1px 5px; margin-left: 6px;
      background: rgba(180, 140, 255, 0.15); border: 1px solid rgba(180, 140, 255, 0.35);
      color: #b48cff; border-radius: 4px; font-weight: bold; letter-spacing: 1px;
    }
    #myScore {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 20px;
      text-shadow: 0 0 14px rgba(180, 140, 255, 0.6);
    }
    #minimap {
      position: absolute; bottom: 10px; right: 10px;
      width: 150px; height: 150px;
      background: rgba(10, 6, 32, 0.6); border: 1px solid rgba(180, 140, 255, 0.2);
      border-radius: 8px;
    }
    #playerCount {
      position: absolute; top: 10px; left: 10px;
      color: rgba(255, 255, 255, 0.5); font-size: 14px;
    }
    #ping { position: absolute; top: 30px; left: 10px; color: rgba(255, 255, 255, 0.4); font-size: 12px; }

    #controlsHint {
      position: absolute; top: 50%; left: 10px; transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.35); font-size: 11px; letter-spacing: 1px;
      line-height: 1.8;
    }

    /* Server status badge */
    #serverStatus {
      position: fixed; top: 12px; right: 250px; z-index: 150;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 18px;
      background: rgba(10, 6, 32, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      color: rgba(255, 255, 255, 0.7); font-size: 11px;
      font-weight: bold; letter-spacing: 1px; pointer-events: none;
    }
    #serverStatus.status-online { border-color: rgba(100, 255, 150, 0.35); color: #6f9; }
    #serverStatus.status-offline { border-color: rgba(255, 100, 100, 0.35); color: #f66; }
    #serverStatus.status-waking { border-color: rgba(255, 180, 100, 0.35); color: #fb6; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <canvas id="menuBg" style="position:fixed;top:0;left:0;z-index:99;pointer-events:none;"></canvas>

  <div id="serverStatus" class="status-online"><span>SERVER</span><span id="statusText">—</span></div>

  <div id="startScreen">
    <h1>ORB.IO</h1>
    <p class="tagline">Grow. Consume. Dominate.</p>
    <input type="text" id="nameInput" placeholder="Enter your name" maxlength="16" autofocus>
    <button class="btn" id="playAIBtn" style="margin-bottom:10px;">PLAY VS AI</button>
    <button class="btn accent-cyan" id="playBtn" style="margin-bottom:4px;">MULTIPLAYER</button>
    <div id="onlineCount">— online</div>
    <button class="btn accent-pink" id="skinsBtn" style="margin-top:14px;">CHOOSE SKIN</button>
    <p class="subtitle">Mouse to move &middot; Space to split &middot; W to eject mass</p>
  </div>

  <div id="roomScreen">
    <h2>SELECT ROOM</h2>
    <div class="room-list" id="roomList"></div>
    <button class="btn" id="roomBackBtn" style="padding:10px 24px;font-size:14px;">BACK</button>
  </div>

  <div id="skinScreen">
    <h2>CHOOSE SKIN</h2>
    <div class="skin-grid" id="skinGrid"></div>
    <button class="btn" id="skinBackBtn" style="padding:10px 24px;font-size:14px;">BACK</button>
  </div>

  <div id="deathScreen">
    <h2>ABSORBED</h2>
    <p class="score">Final mass: <span id="finalScore">0</span></p>
    <button class="btn" id="respawnBtn" style="margin-bottom:10px;">PLAY AGAIN</button>
    <button class="btn accent-cyan" id="mainMenuBtn" style="padding:10px 24px;font-size:14px;">MAIN MENU</button>
  </div>

  <div id="hud">
    <div id="leaderboard"><h3>Top Orbs</h3><div id="leaderboardEntries"></div></div>
    <div id="myScore">Mass: 0</div>
    <canvas id="minimap" width="150" height="150"></canvas>
    <div id="playerCount">Players: 0</div>
    <div id="ping"></div>
    <div id="controlsHint">MOUSE — MOVE<br>SPACE — SPLIT &amp; LAUNCH<br>W — EJECT MASS (feed virus)</div>
  </div>

  <script src="local-game.js?v=6"></script>
  <script src="game.js?v=7"></script>
</body>
</html>
